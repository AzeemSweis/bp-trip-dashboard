server {
    listen 80;
    server_name _;

    # Serve the React SPA build
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — send all non-file requests to index.html so React Router
    # handles client-side navigation. The `=404` means: if index.html itself
    # doesn't exist, return a 404 (prevents infinite redirect loops).
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Proxy /api/* and /health to the FastAPI backend.
    # "backend" resolves via Docker Compose's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Prevent nginx from rewriting redirect responses from the backend
        proxy_redirect     off;
    }

    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # Deny access to dotfiles (.env, .git, etc.) that might end up in the
    # static dir accidentally.
    location ~ /\. {
        deny all;
    }
}
